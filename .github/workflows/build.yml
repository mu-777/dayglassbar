name: build

# Windows と macOS の配布物を、それぞれのネイティブ環境で生成する。
# WSL(Linux) からは macOS ビルドができないため、両OS分はここ(CI)で出す。
#   - 手動実行 (workflow_dispatch): Artifacts のみ生成（Release は作らない）
#   - v* タグ push: 両OSをビルドし GitHub Release にバイナリを添付
# package-lock.json をコミットしておくこと（npm ci に必要）。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write          # タグ push 時に Release を作成するため
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win        # nsis インストーラ + portable
          - os: macos-latest
            platform: mac        # dmg（arm64。ランナーは Apple Silicon）
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Materialize the OAuth credentials into the gitignored local file so they are bundled
      # into the artifact. config.js reads env at *runtime*, which the shipped app doesn't
      # have, so the values must be written to disk before packaging (files: src/**/* picks it
      # up). client_ids are PUBLIC ids → repository *Variables*. Google's "Desktop app" client
      # also needs a client_secret (Google requires it even with PKCE; it ships in the app and
      # Google doesn't treat it as confidential) → kept as a *Secret* for log masking. Microsoft
      # is a public client (no secret). Empty when unset → build still succeeds, just without
      # that provider's cloud connect.
      - name: Write OAuth credentials
        env:
          GOOGLE_CLIENT_ID: ${{ vars.DAYGLASSBAR_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.DAYGLASSBAR_GOOGLE_CLIENT_SECRET }}
          MS_CLIENT_ID: ${{ vars.DAYGLASSBAR_MS_CLIENT_ID }}
        run: |
          node -e "require('fs').writeFileSync('src/main/calendar/client-ids.local.json', JSON.stringify({ google: process.env.GOOGLE_CLIENT_ID || '', google_secret: process.env.GOOGLE_CLIENT_SECRET || '', microsoft: process.env.MS_CLIENT_ID || '' }))"

      - name: Build (${{ matrix.platform }})
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dayglassbar-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.blockmap

      # Release body = the CHANGELOG.md section for this tag (single source of truth).
      # bash is available on both windows/macos runners; ${GITHUB_REF_NAME#v} strips the "v".
      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: node tools/extract-changelog.mjs "${GITHUB_REF_NAME#v}" > RELEASE_NOTES.md

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.blockmap
